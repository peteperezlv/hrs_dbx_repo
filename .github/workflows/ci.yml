name: Continuous Integration

on:
  push:
    branches:
      - feature

jobs:
  validate:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Display Branch
        run: |
          echo "Running CI on branch:"
          echo "${{ github.ref_name }}"

      - name: List Repository Contents
        run: |
          pwd
          ls -R
    
      # Validation steps
      - name: Verify Repository Structure
        run: |
          test -d sql
          test -d notebooks

      - name: List SQL Files
        run: find sql -name "*.sql"

      - name: List Notebooks
        run: find notebooks
    
      # End Step
      - name: CI Completed
        run: echo "Repository validation completed successfully."